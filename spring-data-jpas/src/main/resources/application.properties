# ############################################################################
# 애플리케이션 설정
# ----------------------------------------------------------------------------
# 여기 값은 "기본값" 이고, 환경변수로 덮어쓸 수 있다.
# compose.yaml 이 SPRING_DATASOURCE_URL 등을 주입해서 컨테이너용 값으로 바꾼다.
#
# 덮어쓰기 규칙(relaxed binding): 대문자로 바꾸고 . 을 _ 로.
#   spring.datasource.url  ->  SPRING_DATASOURCE_URL
# ############################################################################

spring.application.name=spring-data-jpas


# ============================================================================
# DataSource — DB 접속 정보
# ============================================================================
# 아래 기본값은 "로컬에서 직접 실행할 때" 를 가정한다 (localhost:3306).
# docker compose 로 띄우면 compose.yaml 의 환경변수가 이 값들을 덮어쓴다.
# (컨테이너에서는 호스트가 localhost 가 아니라 서비스 이름인 mysql 이 된다)

# jdbc:mysql://호스트:포트/데이터베이스이름?옵션들
#
# 각 옵션의 의미:
#   useSSL=false
#       로컬 개발용 접속이라 SSL 을 끈다. 안 끄면 인증서 경고가 뜬다.
#       [주의] 실제 운영 DB 에는 절대 이렇게 하지 않는다. 통신이 평문이 된다.
#   allowPublicKeyRetrieval=true
#       MySQL 8 의 기본 인증 방식(caching_sha2_password)에서 필요하다.
#       없으면 "Public Key Retrieval is not allowed" 오류로 접속이 안 된다.
#   serverTimezone=Asia/Seoul
#       시간대를 명시한다. 안 하면 서버와 앱의 시간대가 달라서
#       저장한 날짜가 9시간씩 밀리는 고전적인 사고가 난다.
#   characterEncoding=UTF-8
#       한글이 ??? 로 깨지는 것을 막는다.
spring.datasource.url=jdbc:mysql://localhost:3306/academy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=academy
spring.datasource.password=academy1234

# JDBC 드라이버 클래스.
# 요즘은 URL 만 보고 스프링이 알아서 찾아주므로 생략해도 되지만, 명시하면 의도가 분명해진다.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------------------------------
# 커넥션 풀 (HikariCP)
# ----------------------------------------------------------------------------
# DB 연결을 맺는 건 비싼 작업이다(TCP 연결 + 인증). 요청마다 새로 맺으면 매우 느리다.
# 그래서 미리 몇 개 만들어두고 빌려주고 돌려받는 방식을 쓴다. 이게 커넥션 풀이다.
#
# 최대 개수를 무작정 늘리면 안 된다. MySQL 쪽에도 max_connections 한계가 있어서,
# 앱 서버를 여러 대 띄우면 커넥션이 금방 고갈된다.
spring.datasource.hikari.maximum-pool-size=10
# DB 연결을 못 얻으면 30초 안에 실패 처리한다(무한 대기 방지).
spring.datasource.hikari.connection-timeout=30000


# ============================================================================
# JPA / Hibernate
# ============================================================================

# ----------------------------------------------------------------------------
# ddl-auto — 엔티티를 보고 테이블을 자동으로 만들지 여부
# ----------------------------------------------------------------------------
# 선택지:
#   none        아무것도 안 함
#   validate    테이블이 엔티티와 맞는지 검사만 (안 맞으면 기동 실패)
#   update      부족한 테이블·컬럼을 추가 (삭제는 안 함)
#   create      기동할 때마다 테이블을 지우고 새로 생성
#   create-drop create + 종료 시 삭제
#
# 학습용이라 update 를 쓴다. 엔티티만 만들면 테이블이 알아서 생겨서 편하다.
#
# ⛔ 운영 환경에서는 절대 update 이상을 쓰지 않는다.
#    - create 계열은 말 그대로 운영 데이터를 전부 날린다
#    - update 도 위험하다. 컬럼 타입을 바꾸면 의도치 않은 변경이 일어나고,
#      되돌릴 방법이 없으며, 어떤 SQL 이 실행될지 예측할 수 없다.
#
# 실무에서는 validate 로 두고, 스키마 변경은 Flyway·Liquibase 같은
# 마이그레이션 도구로 버전 관리하며 적용한다.
spring.jpa.hibernate.ddl-auto=update

# ----------------------------------------------------------------------------
# SQL 로그 — 이 예제의 핵심 학습 도구
# ----------------------------------------------------------------------------
# N+1 문제를 "눈으로 보려면" 실제로 나가는 쿼리를 봐야 한다.
# 이 설정들이 없으면 쿼리가 몇 번 나가는지 알 방법이 없다.

# 실행되는 SQL 을 로그에 출력한다.
spring.jpa.show-sql=true
# SQL 을 보기 좋게 줄바꿈·들여쓰기 해준다.
spring.jpa.properties.hibernate.format_sql=true
# ? 자리에 실제로 들어간 값을 함께 보여준다 (파라미터 바인딩 로그).
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# [운영 주의] 위 세 줄은 운영에서 전부 꺼야 한다.
#   - 로그량이 폭증해서 디스크가 찬다
#   - 바인딩 로그에는 비밀번호·개인정보 같은 실제 값이 그대로 찍힌다

# ----------------------------------------------------------------------------
# open-in-view — 반드시 꺼야 하는 설정
# ----------------------------------------------------------------------------
# 기본값이 true 인데, 스프링 부트도 기동할 때 "끄는 걸 권장한다" 는 경고를 띄운다.
#
# true 이면: HTTP 응답이 끝날 때까지 DB 커넥션을 계속 붙잡고 있는다.
#   장점 - 컨트롤러나 JSON 변환 시점에도 LAZY 로딩이 되어 편하다
#   단점 - 커넥션을 오래 점유해서, 트래픽이 몰리면 커넥션 풀이 바닥난다.
#          그러면 DB 는 멀쩡한데 앱 전체가 멈춘다. 원인 찾기도 어렵다.
#
# false 이면: 트랜잭션이 끝나면 커넥션을 즉시 반납한다.
#   대신 트랜잭션 밖에서 LAZY 필드를 건드리면 LazyInitializationException 이 난다.
#   -> 이게 오히려 좋다. "트랜잭션 안에서 DTO 변환을 끝내라" 는 규율을 강제해준다.
#   이 예제도 서비스 계층에서 DTO 로 변환해 내보내므로 false 로 둔다.
spring.jpa.open-in-view=false

# 하이버네이트가 사용할 DB 방언(dialect)은 명시하지 않았다.
# 요즘 버전은 접속한 DB 를 보고 알아서 판단하며, 잘못 지정하면 오히려 문제가 된다.


# ============================================================================
# Actuator
# ============================================================================
# health 에 DB 연결 상태가 포함된다. compose 의 healthcheck 가 이걸 찌른다.
# DB 가 죽으면 이 엔드포인트가 DOWN 이 되므로, 앱만 살아있고 DB 는 끊긴 상태를 잡아낸다.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# health 응답에 세부 항목(db, diskSpace 등)을 함께 보여준다.
# [운영 주의] 내부 구성 정보가 노출되므로 운영에서는 never 로 둔다.
management.endpoint.health.show-details=always
