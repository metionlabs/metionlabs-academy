# ############################################################################
# 컨테이너 2개짜리 구성 — 여기가 이 예제의 핵심이다
# ----------------------------------------------------------------------------
#   mysql : 데이터베이스
#   app   : 스프링 애플리케이션
#
# 앞 예제는 컨테이너가 1개였다. 2개가 되는 순간 새로운 문제가 생긴다.
#
#   "앱이 DB보다 먼저 떠버리면 어떻게 되나?"
#
# MySQL 은 처음 뜰 때 데이터 디렉토리를 초기화하느라 20~30초가 걸린다.
# 그 사이에 앱이 접속을 시도하면 Connection refused 로 죽는다.
# 이걸 해결하는 방법(healthcheck + depends_on)이 아래에 나온다.
#
# 자주 쓰는 명령:
#   docker compose up --build       빌드하고 띄우기
#   docker compose logs -f app      앱 로그만 실시간으로 (SQL 로그 보기)
#   docker compose down             끄기 (DB 데이터는 남는다)
#   docker compose down -v          끄고 DB 데이터까지 삭제 (완전 초기화)
# ############################################################################

services:

  # ==========================================================================
  # MySQL 데이터베이스
  # ==========================================================================
  mysql:
    # 8.4 = MySQL 의 LTS 버전.
    #
    # [중요] latest 를 쓰면 안 된다.
    # 오늘 받은 latest 와 한 달 뒤 팀원이 받는 latest 가 다른 버전일 수 있다.
    # 그러면 "내 컴퓨터에선 되는데요" 가 다시 시작된다.
    # 버전을 고정하는 것이 재현 가능한 환경의 기본이다.
    image: mysql:8.4

    # 컨테이너 이름을 고정하면 docker exec 등에서 쓰기 편하다.
    container_name: academy-mysql

    # ------------------------------------------------------------------------
    # MySQL 공식 이미지가 인식하는 환경변수들
    # ------------------------------------------------------------------------
    # 이 값들을 주면 컨테이너가 처음 시작될 때 DB 와 계정을 알아서 만들어준다.
    # 네이티브 설치라면 손으로 해야 하는 작업들이다:
    #   mysql -u root -p
    #   CREATE DATABASE academy ...;
    #   CREATE USER 'academy'@'%' ...;
    #   GRANT ALL ON academy.* TO 'academy'@'%';
    environment:
      MYSQL_ROOT_PASSWORD: root1234   # root 계정 비밀번호
      MYSQL_DATABASE: academy         # 자동으로 만들어질 데이터베이스
      MYSQL_USER: academy             # 자동으로 만들어질 사용자
      MYSQL_PASSWORD: academy1234     # 그 사용자의 비밀번호
      TZ: Asia/Seoul                  # 컨테이너 시간대

    # [보안] 여기 비밀번호가 그대로 적혀 있는 건 학습용이라서다.
    # 실제 프로젝트에서는 이 파일을 git 에 올리므로 비밀번호를 직접 쓰면 안 된다.
    # .env 파일로 분리하고 .gitignore 에 넣거나, 시크릿 관리 도구를 쓴다.
    #   예: MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    # ------------------------------------------------------------------------
    # 실행 옵션 (my.cnf 를 파일로 만들지 않고 여기서 넘긴다)
    # ------------------------------------------------------------------------
    command:
      # 한글 처리의 핵심. utf8mb4 는 4바이트까지 지원해서 이모지도 저장된다.
      # (옛 utf8 은 3바이트라 이모지를 넣으면 오류가 난다. 이름만 utf8 인 반쪽짜리다)
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

    ports:
      # 호스트 3306 -> 컨테이너 3306.
      #
      # 앱은 컨테이너끼리 통신하므로 이 설정이 없어도 동작한다.
      # 그럼에도 열어두는 이유는 DBeaver, DataGrip, MySQL Workbench 같은
      # GUI 툴로 내 노트북에서 직접 붙어 데이터를 눈으로 보기 위해서다.
      # 학습할 때 이게 있으면 이해가 훨씬 빠르다.
      #
      # [충돌 주의] 이미 로컬에 MySQL 을 설치해 뒀다면 3306 이 사용 중이라 실패한다.
      # 그 경우 왼쪽만 바꾸면 된다. 예) "13306:3306" -> GUI 툴은 13306 으로 접속
      - "3306:3306"

    # ------------------------------------------------------------------------
    # volumes — 데이터를 컨테이너 밖에 보관하기
    # ------------------------------------------------------------------------
    # [중요] 컨테이너는 지우면 안의 파일도 같이 사라진다.
    # 이 설정이 없으면 docker compose down 한 번에 DB 데이터가 전부 날아간다.
    #
    # 이름 있는 볼륨(named volume)에 데이터를 저장하면 컨테이너를 지웠다 다시 만들어도
    # 데이터가 남는다. mysql-data 는 파일 맨 아래에서 선언한다.
    #
    # 반대로 "완전히 초기화하고 싶다" 면 docker compose down -v 를 쓴다.
    # (-v = 볼륨까지 삭제) 학습 중 스키마가 꼬였을 때 이 한 줄로 처음 상태로 돌아간다.
    # 네이티브 설치였다면 이 복구가 훨씬 번거롭다.
    volumes:
      - mysql-data:/var/lib/mysql

    # ------------------------------------------------------------------------
    # healthcheck — "MySQL 이 접속을 받을 준비가 됐는가?"
    # ------------------------------------------------------------------------
    # 이게 이 예제에서 가장 중요한 설정이다.
    #
    # 컨테이너가 "실행 중(running)" 이라는 것과 "MySQL 이 접속을 받을 수 있다" 는 다르다.
    # MySQL 은 처음 기동할 때 시스템 테이블을 만들고 초기화하느라 시간이 걸리고,
    # 그동안은 프로세스가 떠 있어도 접속이 거부된다.
    #
    # mysqladmin ping 은 "서버 살아있니?" 를 묻는 가장 가벼운 확인 방법이다.
    healthcheck:
      # -p 와 비밀번호 사이에 공백이 없는 것에 주의. mysql 명령의 문법이다.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 5s      # 5초마다 확인
      timeout: 3s
      retries: 20       # 20번까지 재시도 (최대 100초 정도 기다려준다)
      start_period: 30s # 초기화 시간을 감안한 유예 구간

  # ==========================================================================
  # 스프링 애플리케이션
  # ==========================================================================
  app:
    build:
      context: .
    image: metionlabs-academy/spring-data-jpas:latest
    container_name: academy-app

    # ------------------------------------------------------------------------
    # depends_on — 기동 순서 제어
    # ------------------------------------------------------------------------
    # [핵심] condition: service_healthy 가 있고 없고의 차이가 크다.
    #
    #   depends_on: [mysql]                     <- 컨테이너가 "시작" 되기만 기다린다.
    #                                              MySQL 이 아직 초기화 중이어도 앱이 떠버린다.
    #                                              -> Connection refused 로 앱이 죽는다.
    #
    #   condition: service_healthy              <- healthcheck 가 통과할 때까지 기다린다.
    #                                              MySQL 이 진짜 준비된 뒤에 앱이 뜬다.
    #
    # 그냥 depends_on 만 쓰고 "왜 가끔 죽지?" 하며 헤매는 경우가 정말 많다.
    # 컨테이너 시작 != 서비스 준비 완료. 이 구분이 이 예제의 핵심 교훈이다.
    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    # ------------------------------------------------------------------------
    # DB 접속 정보 주입
    # ------------------------------------------------------------------------
    # application.properties 의 기본값(localhost)을 컨테이너용으로 덮어쓴다.
    environment:
      # [중요] 호스트가 localhost 가 아니라 mysql 이다.
      #
      # 컨테이너 안에서 localhost 는 "그 컨테이너 자신" 을 가리킨다.
      # 앱 컨테이너 안에는 MySQL 이 없으므로 접속에 실패한다.
      #
      # compose 는 같은 네트워크의 컨테이너들이 서비스 이름으로 서로를 찾게 해준다.
      # 그래서 호스트명으로 mysql(= 위에서 정의한 서비스 이름)을 쓴다.
      # IP 를 알 필요도, 고정할 필요도 없다.
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/academy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: academy
      SPRING_DATASOURCE_PASSWORD: academy1234
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Seoul

    healthcheck:
      # 앱의 health 에는 DB 연결 상태도 포함된다.
      # DB 가 끊기면 이 값이 DOWN 이 되므로, 껍데기만 살아있는 상태를 걸러낼 수 있다.
      test: ["CMD", "sh", "-c", "curl -fs http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

    deploy:
      resources:
        limits:
          memory: 512M

# ############################################################################
# volumes 선언
# ----------------------------------------------------------------------------
# 위 services 에서 사용한 이름 있는 볼륨을 여기서 정의한다.
# 도커가 알아서 저장 공간을 관리해주므로 우리는 이름만 정하면 된다.
#
# 확인:  docker volume ls
# 삭제:  docker compose down -v
# ############################################################################
volumes:
  mysql-data:
