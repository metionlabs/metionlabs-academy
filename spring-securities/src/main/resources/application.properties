# ############################################################################
# 애플리케이션 설정
# ----------------------------------------------------------------------------
# 기본값은 "로컬 직접 실행" 기준. docker compose 로 띄우면 compose.yaml 의
# 환경변수가 이 값들을 덮어쓴다. (DB 호스트 localhost -> mysql, JWT_SECRET 주입 등)
# ############################################################################

spring.application.name=spring-securities


# ============================================================================
# DataSource (사용자 정보를 저장할 MySQL)
# ============================================================================
# 각 URL 옵션의 의미는 spring-data-jpas 예제의 application.properties 에 자세히 있다.
spring.datasource.url=jdbc:mysql://localhost:3306/academy_security?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=academy
spring.datasource.password=academy1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ============================================================================
# JPA
# ============================================================================
# 학습용이라 update. 운영에서는 절대 쓰지 않는다(spring-data-jpas 예제 설명 참고).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# ============================================================================
# JWT — 이 예제의 핵심 설정
# ============================================================================

# ----------------------------------------------------------------------------
# jwt.secret — 토큰 서명에 쓰는 비밀 키
# ----------------------------------------------------------------------------
# [보안 경고] 이 값은 학습용 기본값이다. 실무에서는 절대 코드/설정에 평문으로 두지 않는다.
#   - 이 키가 유출되면 누구나 원하는 내용(예: role=ADMIN)으로 위조 토큰을 만들 수 있다.
#   - 그래서 실제로는 환경변수(JWT_SECRET)로만 주입한다. compose.yaml 이 그렇게 넘긴다.
#
# HS256 알고리즘은 최소 256비트(=32바이트=32자) 키를 요구한다.
# 아래 값은 그보다 길다. 짧으면 애플리케이션 기동 시점에 예외가 난다(약한 키 방지).
jwt.secret=academy-super-secret-key-change-this-in-production-please-32chars+

# ----------------------------------------------------------------------------
# jwt.expiration-millis — 토큰 유효 시간
# ----------------------------------------------------------------------------
# 3600000ms = 1시간.
#
# [트레이드오프] 이 값을 정하는 건 보안과 편의의 줄다리기다.
#   짧게 -> 토큰이 탈취돼도 금방 만료되어 안전하다. 대신 자주 재로그인해야 한다.
#   길게 -> 편하지만, 토큰이 탈취되면 그만큼 오래 악용된다.
#           또 서버에서 권한을 바꿔도 기존 토큰은 만료 전까지 옛 권한을 들고 다닌다.
#
# 실무에서는 access token 을 짧게(15~30분) 두고, 별도의 refresh token(길게)으로
# 조용히 재발급하는 구조를 쓴다. 이 예제는 개념 집중을 위해 access token 하나만 다룬다.
jwt.expiration-millis=3600000


# ============================================================================
# Actuator
# ============================================================================
# /actuator/health/** 는 SecurityConfig 에서 인증 없이 열어두었다.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
