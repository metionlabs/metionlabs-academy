# ############################################################################
# Docker Compose 파일
# ----------------------------------------------------------------------------
# docker run 명령에 붙는 긴 옵션들(-p, -e, --memory ...)을 파일로 적어두는 것.
#
# 명령 하나로 대체된다:
#   docker run -p 8080:8080 -e ACADEMY_GREETING="..." --memory 512m ...  (길다)
#   docker compose up                                                     (짧다)
#
# 컨테이너가 여러 개(앱 + DB + 캐시 ...)가 되면 차이가 결정적으로 벌어진다.
#
# 자주 쓰는 명령:
#   docker compose up --build     빌드하고 띄우기 (포그라운드, 로그가 쭉 보임)
#   docker compose up -d --build  같은데 백그라운드로 (-d = detached)
#   docker compose ps             지금 뭐가 떠 있는지
#   docker compose logs -f        로그 실시간 보기 (-f = follow)
#   docker compose down           끄고 정리하기
# ############################################################################

# services = 띄울 컨테이너들의 목록. 지금은 앱 하나뿐이다.
# 나중에 DB 를 붙이면 여기에 db: 서비스를 하나 더 추가하게 된다.
services:

  # "app" 은 내가 정한 서비스 이름이다.
  # 이 이름은 컨테이너끼리 통신할 때 호스트명으로도 쓰인다.
  # (예: db 서비스를 추가하면 앱에서 jdbc:mysql://db:3306 처럼 접근 가능. IP 를 몰라도 된다)
  app:

    # ------------------------------------------------------------------------
    # build = 이미지를 어디서 빌드할지
    # ------------------------------------------------------------------------
    # 이미 만들어진 이미지를 받아 쓸 거라면 build 대신 image 만 적으면 된다.
    # 여기서는 우리가 직접 만든 Dockerfile 로 빌드한다.
    build:
      # context = 빌드 컨텍스트. 이 경로의 파일들이 도커 데몬으로 전송된다.
      # "." 은 이 compose.yaml 이 있는 폴더.
      # .dockerignore 에 적힌 것들은 전송에서 제외된다 (그래서 .dockerignore 가 중요하다).
      context: .

    # 빌드된 이미지에 붙일 이름:태그.
    # 이 줄이 없으면 spring-boot-dockers-app 처럼 자동으로 지어진다.
    image: metionlabs-academy/spring-boot-dockers:latest

    # ------------------------------------------------------------------------
    # ports = 포트 연결 (호스트 -> 컨테이너)
    # ------------------------------------------------------------------------
    # 컨테이너는 격리된 자기만의 네트워크를 가진다.
    # 컨테이너 안에서 8080 이 열려 있어도, 이 설정이 없으면 내 맥에서 접속할 수 없다.
    #
    # "8080:8080" = 내 맥의 8080 으로 온 요청을 컨테이너의 8080 으로 넘겨라.
    #                  ^왼쪽=호스트   ^오른쪽=컨테이너
    #
    # 왼쪽을 바꾸면 접속 주소가 바뀐다. 예) "18080:8080" -> http://localhost:18080
    # 8080 이 이미 쓰이고 있어 충돌나면 왼쪽 숫자만 바꾸면 된다.
    #
    # --scale 로 여러 개 띄울 때는 왼쪽을 지우고 "8080" 만 남긴다 (도커가 알아서 빈 포트 배정).
    ports:
      - "8080:8080"

    # ------------------------------------------------------------------------
    # environment = 환경변수 주입
    # ------------------------------------------------------------------------
    # [핵심 개념] 이미지는 한 번 만들고, 환경마다 설정만 바꿔 끼운다.
    # 개발/스테이징/운영마다 이미지를 따로 빌드하면 "테스트한 것과 배포된 것이 다른" 사고가 난다.
    # 같은 이미지 + 다른 환경변수 = 12-factor app 의 기본 원칙.
    environment:
      # application.properties 의 academy.greeting 값을 덮어쓴다.
      #
      # 왜 이름이 맞아떨어지나?
      #   Spring 의 relaxed binding 이 ACADEMY_GREETING -> academy.greeting 으로 변환해준다.
      #   규칙: 대문자로 바꾸고 . 을 _ 로. (academy.greeting -> ACADEMY_GREETING)
      ACADEMY_GREETING: "Hello from Docker"

      # 프로파일 지정. application-docker.properties 파일이 있으면 추가로 읽힌다.
      # (지금은 그 파일이 없지만, 환경별 설정 분리를 연습할 자리다)
      SPRING_PROFILES_ACTIVE: docker

    # ------------------------------------------------------------------------
    # healthcheck = 이 컨테이너가 "일할 준비가 됐는지" 판정하는 방법
    # ------------------------------------------------------------------------
    # [중요] "컨테이너가 떠 있다" 와 "요청을 처리할 수 있다" 는 다르다.
    # 자바 앱은 프로세스가 뜨고 나서 스프링 컨텍스트 로딩까지 몇 초가 더 걸린다.
    # 그 사이에 들어온 요청은 전부 실패한다.
    #
    # 실무에서 이걸 안 하면: 배포 직후 로드밸런서가 아직 준비 안 된 서버로 트래픽을 보내
    # 502 에러가 쏟아진다. 쿠버네티스의 readinessProbe 도 정확히 같은 개념이다.
    healthcheck:
      # CMD = 이 명령을 컨테이너 안에서 실행해 성공(종료코드 0)인지 본다.
      #   curl -f : HTTP 에러(4xx/5xx)면 실패로 처리 (안 붙이면 404 도 "성공"이 된다)
      #   -s      : 진행률 출력 끄기
      #   grep -q UP : 응답 본문에 UP 이 있는지. -q 는 출력 없이 결과코드만.
      #
      # 주의: temurin JRE 이미지엔 curl 이 없어서 Dockerfile 에서 따로 설치했다.
      test: ["CMD", "sh", "-c", "curl -fs http://localhost:8080/actuator/health/readiness | grep -q UP"]

      interval: 10s      # 10초마다 검사
      timeout: 3s        # 3초 안에 응답 없으면 그 회차는 실패
      retries: 5         # 5번 연속 실패하면 unhealthy 로 판정
      start_period: 40s  # 뜨는 데 걸리는 시간. 이 구간의 실패는 retries 로 안 센다.
                         # 너무 짧게 잡으면 아직 뜨는 중인 앱을 죽은 걸로 오판한다.

    # ------------------------------------------------------------------------
    # 리소스 제한
    # ------------------------------------------------------------------------
    # 컨테이너가 쓸 수 있는 메모리 상한. 한 컨테이너가 폭주해서
    # 호스트 전체를 마비시키는 걸 막는 안전장치다.
    #
    # Dockerfile 의 -XX:MaxRAMPercentage=75.0 과 짝을 이룬다:
    #   512M 제한 -> JVM 힙은 그 75% 인 약 384MB
    #   실제로 http://localhost:8080 응답의 maxMemoryMb 로 확인할 수 있다.
    deploy:
      resources:
        limits:
          memory: 512M
