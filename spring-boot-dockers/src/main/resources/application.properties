# ############################################################################
# 애플리케이션 설정 파일
# ----------------------------------------------------------------------------
# 여기 적힌 값은 "기본값" 이다. 실행할 때 아래 순서로 덮어쓸 수 있다.
# (뒤로 갈수록 우선순위가 높다)
#
#   1. 이 파일
#   2. application-{프로파일}.properties      예: application-docker.properties
#   3. 환경변수                                예: ACADEMY_GREETING=...
#   4. 커맨드라인 인자                          예: --academy.greeting=...
#
# [핵심] 이 구조 덕분에 "이미지는 한 번만 빌드하고, 환경마다 설정만 바꿔 끼우는" 게 가능하다.
# 개발/운영마다 이미지를 따로 만들면 "테스트한 것과 배포한 것이 다른" 사고가 난다.
# ############################################################################

# 애플리케이션 이름. 로그나 메트릭에 이 이름이 붙어서 어느 앱인지 구분된다.
spring.application.name=spring-boot-dockers


# ----------------------------------------------------------------------------
# 실습용 설정값
# ----------------------------------------------------------------------------
# HelloController 가 @Value("${academy.greeting}") 로 주입받는 값이다.
#
# 컨테이너에서 이 값을 바꿔보기:
#   docker run -e ACADEMY_GREETING="안녕하세요" ...
#
# 왜 ACADEMY_GREETING 이라는 이름이 academy.greeting 에 들어맞는가?
#   Spring 의 relaxed binding 규칙 때문. 전부 대문자로 바꾸고 . 을 _ 로 바꾸면 된다.
#   academy.greeting  <->  ACADEMY_GREETING
#   리눅스 환경변수 이름에는 점(.)을 쓸 수 없어서 생긴 규칙이다.
academy.greeting=Hello from metionlabs academy


# ----------------------------------------------------------------------------
# Actuator — 운영용 엔드포인트
# ----------------------------------------------------------------------------
# Actuator 는 앱 상태를 들여다보는 엔드포인트를 자동으로 만들어준다.
# 다만 기본적으로 대부분 잠겨 있다. 아무나 앱 내부 정보를 보면 안 되기 때문이다.

# 외부에 열어줄 엔드포인트 목록. 여기 적은 것만 HTTP 로 노출된다.
#   health : 앱이 정상인지
#   info   : 앱 기본 정보
#
# [보안 주의] 편하다고 include=* 로 전부 열면 안 된다.
# env 엔드포인트에는 환경변수가, heapdump 에는 메모리 내용이 그대로 담긴다.
# 즉 DB 비밀번호나 API 키가 통째로 노출될 수 있다. 실제 사고가 자주 나는 지점이다.
management.endpoints.web.exposure.include=health,info

# health 엔드포인트를 liveness / readiness 두 갈래로 쪼개서 제공한다.
#
#   /actuator/health/liveness   프로세스가 살아있나? (죽었으면 재시작해야 함)
#   /actuator/health/readiness  요청을 받을 준비가 됐나? (아니면 트래픽 보내지 말아야 함)
#
# 이 둘의 구분이 실무에서 중요하다:
#   - 기동 중(아직 준비 안 됨): 살아는 있으니 재시작하면 안 되지만, 트래픽도 주면 안 된다
#   - 완전히 멈춤: 재시작해야 한다
# 이걸 구분 못 하면 "기동 중인 앱을 죽었다고 판단해 계속 재시작 -> 영원히 안 뜸" 이 된다.
#
# compose.yaml 의 healthcheck 는 readiness 를 찌른다.
# 쿠버네티스의 livenessProbe / readinessProbe 도 정확히 같은 개념이다.
management.endpoint.health.probes.enabled=true
